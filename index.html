<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kjh000113-web | Collection Market</title>
    <meta
      name="description"
      content="출석으로 포인트를 모으고 일반, 고급, 초월 뽑기로 컬렉션을 모아 판매하는 모바일 컬렉션 앱입니다."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <main>
        <section id="homeView" class="tab-view home-view is-active" data-view="home">
          <div id="collectionSlider" class="collection-slider" aria-live="polite"></div>
        </section>

        <section id="attendanceView" class="tab-view" data-view="attendance">
          <div class="section-title">
            <p class="eyebrow">Attendance</p>
            <h2>출석 체크판</h2>
          </div>

          <article class="attendance-panel">
            <div>
              <span class="panel-label">오늘 보상</span>
              <strong>+100P</strong>
              <p id="attendanceMessage">오늘 출석 체크를 기다리고 있어요.</p>
            </div>
            <button id="attendanceButton" class="button button--primary" type="button">
              출석 체크
            </button>
          </article>

          <div class="streak-panel">
            <div>
              <span>연속 출석</span>
              <strong><span id="streakCount">0</span>일</strong>
            </div>
            <p>한국시간 00시에 새 출석이 열립니다.</p>
          </div>

          <div id="attendanceBoard" class="attendance-board"></div>
        </section>

        <section id="drawView" class="tab-view" data-view="draw">
          <div class="section-title">
            <p class="eyebrow">Draw</p>
            <h2>뽑기</h2>
          </div>

          <article class="draw-panel">
            <div class="draw-machine" aria-hidden="true">
              <span class="machine-ring"></span>
              <span class="machine-core">?</span>
            </div>
            <div class="draw-copy">
              <span class="panel-label">이미지 풀</span>
              <p>세계관 이미지와 랜덤 이름을 조합해 컬렉션을 만듭니다.</p>
            </div>
            <p id="drawMessage" class="helper-text">
              일반, 고급, 초월 뽑기 중 하나를 선택하세요.
            </p>
          </article>

          <div id="drawSectionList" class="draw-section-list"></div>
          <div id="resultList" class="result-list" aria-live="polite"></div>
        </section>

        <section id="manageView" class="tab-view" data-view="manage">
          <div class="section-title">
            <p class="eyebrow">Manage</p>
            <h2>컬렉션 관리</h2>
          </div>

          <div id="manageList" class="manage-list"></div>
        </section>
      </main>

      <nav class="bottom-tabs" aria-label="하단 메뉴">
        <button class="tab-button is-active" type="button" data-target="home">
          <span>홈</span>
        </button>
        <button class="tab-button" type="button" data-target="attendance">
          <span>출석</span>
        </button>
        <button class="tab-button" type="button" data-target="draw">
          <span>뽑기</span>
        </button>
        <button class="tab-button" type="button" data-target="manage">
          <span>관리</span>
        </button>
      </nav>
    </div>

    <script src="script.js"></script>
  </body>
</html>
