<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kjh000113-web | Collection Market</title>
    <meta
      name="description"
      content="출석으로 포인트를 모으고 뽑기로 컬렉션을 모아 판매하는 모바일 컬렉션 앱입니다."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Collection Market</p>
          <h1>컬렉션 마켓</h1>
        </div>
        <div class="point-pill">
          <span>POINT</span>
          <strong id="pointBalance">0P</strong>
        </div>
      </header>

      <main>
        <section id="homeView" class="tab-view is-active" data-view="home">
          <div class="section-title">
            <p class="eyebrow">My Collection</p>
            <h2>모아둔 컬렉션</h2>
          </div>

          <div class="summary-grid">
            <article class="summary-card">
              <span>보유</span>
              <strong id="holdingCount">0개</strong>
            </article>
            <article class="summary-card">
              <span>평균 호감도</span>
              <strong id="averageAffinity">0</strong>
            </article>
          </div>

          <div id="collectionSlider" class="collection-slider" aria-live="polite"></div>
        </section>

        <section id="attendanceView" class="tab-view" data-view="attendance">
          <div class="section-title">
            <p class="eyebrow">Attendance</p>
            <h2>출석 체크판</h2>
          </div>

          <article class="attendance-panel">
            <div>
              <span class="panel-label">오늘 보상</span>
              <strong>+100P</strong>
              <p id="attendanceMessage">오늘 출석 체크를 기다리고 있어요.</p>
            </div>
            <button id="attendanceButton" class="button button--primary" type="button">
              출석 체크
            </button>
          </article>

          <div class="streak-panel">
            <div>
              <span>연속 출석</span>
              <strong><span id="streakCount">0</span>일</strong>
            </div>
            <p>한국시간 00시에 새 출석이 열립니다.</p>
          </div>

          <div id="attendanceBoard" class="attendance-board"></div>
        </section>

        <section id="drawView" class="tab-view" data-view="draw">
          <div class="section-title">
            <p class="eyebrow">Draw</p>
            <h2>뽑기</h2>
          </div>

          <article class="draw-panel">
            <div class="draw-machine" aria-hidden="true">
              <span class="machine-ring"></span>
              <span class="machine-core">?</span>
            </div>
            <div class="draw-copy">
              <span class="panel-label">가격</span>
              <p>1회 30P · 10회 270P</p>
            </div>
            <div class="draw-actions">
              <button id="drawOnceButton" class="button button--primary" type="button">
                1회 뽑기
              </button>
              <button id="drawTenButton" class="button button--secondary" type="button">
                10회 뽑기
              </button>
            </div>
            <p id="drawMessage" class="helper-text">
              포인트를 모아 컬렉션 아이템을 획득하세요.
            </p>
          </article>

          <div id="resultList" class="result-list" aria-live="polite"></div>
        </section>

        <section id="manageView" class="tab-view" data-view="manage">
          <div class="section-title">
            <p class="eyebrow">Manage</p>
            <h2>컬렉션 관리</h2>
          </div>

          <div class="market-note">
            <strong>오늘의 주가</strong>
            <p>아이템 가격은 한국시간 기준으로 매일 바뀝니다. 오래 보유하면 호감도가 올라갑니다.</p>
          </div>

          <div id="manageList" class="manage-list"></div>
        </section>
      </main>

      <nav class="bottom-tabs" aria-label="하단 메뉴">
        <button class="tab-button is-active" type="button" data-target="home">
          <span>홈</span>
        </button>
        <button class="tab-button" type="button" data-target="attendance">
          <span>출석</span>
        </button>
        <button class="tab-button" type="button" data-target="draw">
          <span>뽑기</span>
        </button>
        <button class="tab-button" type="button" data-target="manage">
          <span>관리</span>
        </button>
      </nav>
    </div>

    <script src="script.js"></script>
  </body>
</html>
